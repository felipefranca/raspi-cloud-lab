name: CI Pipeline
on:
  push:
    branches:
      - master
jobs:
  build:
    environment: cloud-learn-secrets
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
      - name: Build and Clean With Maven
        run: mvn clean package -DskipTests
      - name: Login Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
      - name: Setup Buildx
        uses: docker/setup-buildx-action@v3
      - name: Build and Push Multi-Arch Image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            felipejofranca/raspi-cloud-lab:latest
            felipejofranca/raspi-cloud-lab:${{ github.sha }}
          platforms: linux/amd64,linux/arm64

  deploy:
    name: Deploy on Raspberry
    needs: build
    runs-on: [self-hosted, linux, arm64]
    steps:
      - name: Ensure data directories on USB storage
        run: |
          mkdir -p /data/volumes/raspi-cloud-lab
          mkdir -p /data/logs/raspi-cloud-lab
          mkdir -p /data/backups

      - name: Pull immutable image tag
        run: docker pull felipejofranca/raspi-cloud-lab:${{ github.sha }}

      - name: Stop and remove previous container
        run: |
          docker stop cloud-learn || true
          docker rm cloud-learn || true
          docker stop raspi-cloud-lab || true
          docker rm raspi-cloud-lab || true

      - name: Run updated container
        run: |
          docker run -d \
            --name raspi-cloud-lab \
            --restart unless-stopped \
            --network cloud-network \
            -p 8080:8080 \
            -v /data/volumes/raspi-cloud-lab:/app/data \
            -v /data/logs/raspi-cloud-lab:/app/logs \
            -e spring.datasource.url="jdbc:postgresql://postgres:5432/appdb" \
            -e spring.datasource.username="admin" \
            -e spring.datasource.password="admin" \
            -e logging.file.path="/app/logs" \
            felipejofranca/raspi-cloud-lab:${{ github.sha }}
