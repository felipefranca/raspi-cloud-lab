version: '3.8'

services:
  app:
    container_name: raspi-cloud-lab
    build: .
    image: felipejofranca/raspi-cloud-lab:latest
    ports:
      - "8080:8080"
    volumes:
      - /data/volumes/raspi-cloud-lab:/app/data
      - /data/logs/raspi-cloud-lab:/app/logs
    environment:
      LOGGING_FILE_PATH: /app/logs
    depends_on:
      - postgres

  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: appdb
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin
    ports:
      - "5432:5432"
    volumes:
      - /data/postgresql:/var/lib/postgresql/data
      - /data/backups:/backups
