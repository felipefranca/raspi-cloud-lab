services:
  app:
    container_name: raspi-cloud-lab
    image: felipejofranca/raspi-cloud-lab:${IMAGE_TAG:-latest}
    restart: unless-stopped
    ports:
      - "8080:8080"
    volumes:
      - /data/volumes/raspi-cloud-lab:/app/data
      - /data/logs/raspi-cloud-lab:/app/logs
    environment:
      LOGGING_FILE_PATH: /app/logs
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-appdb}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-admin}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-admin}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - cloud-network

  postgres:
    container_name: postgres
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-appdb}
      POSTGRES_USER: ${POSTGRES_USER:-admin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-admin}
    ports:
      - "5432:5432"
    volumes:
      - /data/postgresql:/var/lib/postgresql/data
      - /data/backups:/backups
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-admin} -d ${POSTGRES_DB:-appdb}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - cloud-network

networks:
  cloud-network:
    external: true
    name: cloud-network
